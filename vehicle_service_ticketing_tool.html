  .stat-label { font-size: 11px; color: var(--color-text-secondary); }

        </div>
      </div>

        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitTicket()">Create Ticket</button>
      </div>
    </div>
  </div>
</div>

let currentView = 'board';
let currentStatusFilter = 'all';
let typeFilter = 'all';
let advisorFilter = null;
let nextId = tickets.length + 1;

function setFilter(filterName, val, el) {
  if (filterName === 'typeFilter') typeFilter = val;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  if (el) el.classList.add('active');
  renderContent();
}

function setView(view, statusFilter) {
  currentView = view;
  currentStatusFilter = statusFilter;
  advisorFilter = null;
  document.getElementById('vb').classList.toggle('active', view !== 'list' && view !== 'deliveries');
  document.getElementById('vl').classList.toggle('active', view === 'list' || view === 'deliveries');
  renderContent();
}

function setAdvisor(adv) {
  advisorFilter = adv;
  currentView = 'list';
  currentStatusFilter = 'all';
  document.getElementById('page-title').textContent = `Advisor: ${adv}`;
  renderContent();
}

function toggleView(v) {
  currentView = v;
  document.getElementById('vb').classList.toggle('active', v === 'board');
  document.getElementById('vl').classList.toggle('active', v === 'list');
  renderContent();
}

function getFiltered() {
  const q = (document.getElementById('search-input')||{}).value || '';
  return tickets.filter(t => {
    if (typeFilter !== 'all' && !t.type.toLowerCase().startsWith(typeFilter.toLowerCase())) return false;
    if (advisorFilter && t.advisor !== advisorFilter) return false;
    if (currentStatusFilter !== 'all' && currentStatusFilter !== 'deliveries' && t.status !== currentStatusFilter) return false;
    if (q) {
      const qq = q.toLowerCase();
      return (t.customer+t.reg+t.model+t.remarks+t.id).toLowerCase().includes(qq);
    }
    return true;
  });
}

const COLUMNS = [
  { key: 'WIP',    label: 'In Progress' },
  { key: 'AP',     label: 'Awaiting Parts' },
  { key: 'AWINSA', label: 'Awaiting Insurance' },
  { key: 'AWCUSA', label: 'Awaiting Customer' },
  { key: 'NA',     label: 'Not Approved' },
  { key: 'RNC',    label: 'Ready / Collect' },
];

function renderStats(data) {
  const total = data.length;
  const wip = data.filter(t => t.status === 'WIP').length;
  const ap = data.filter(t => t.status === 'AP').length;
  const totalParts = data.reduce((s,t) => s + (t.parts||0), 0);
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-box"><div class="stat-num">${total}</div><div class="stat-label">Total tickets</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#EF9F27">${wip}</div><div class="stat-label">In progress</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#378ADD">${ap}</div><div class="stat-label">Awaiting parts</div></div>
    <div class="stat-box"><div class="stat-num" style="color:#639922">₹${(totalParts/100000).toFixed(1)}L</div><div class="stat-label">Parts value</div></div>
  `;
}

function statusBadge(status) {
  const s = STATUS_CONFIG[status] || { label: status, bg:'#F1EFE8', color:'#5F5E5A' };
  return `<span class="status-badge" style="background:${s.bg};color:${s.color}">${s.label}</span>`;
}

function typeBadge(type) {
  const cls = type === 'Mechanical' ? 'badge-mech' : type === 'Conversion' ? 'badge-conv' : 'badge-body';
  return `<span class="badge ${cls}">${type}</span>`;
}

function renderBoard(data) {
  return `<div class="board-view">${COLUMNS.map(col => {
    const cards = data.filter(t => t.status === col.key);
    const cfg = STATUS_CONFIG[col.key];
    return `<div class="column">
      <div class="col-header" style="background:${cfg.bg}20;border:0.5px solid ${cfg.col}40">
        <span class="col-title" style="color:${cfg.color}">${col.label}</span>
        <span class="col-count" style="background:${cfg.bg};color:${cfg.color}">${cards.length}</span>
      </div>
      <div class="col-cards">${cards.length ? cards.map(t => `
        <div class="card" onclick="openDetail('${t.id}')">
          <div class="card-id">${t.id} ${t.jc && t.jc !== 'No JC' ? '· '+t.jc : ''}</div>
          <div class="card-title">${t.customer}</div>
          <div class="card-reg">${t.reg} · ${t.model}</div>
          <div class="card-footer">
            ${typeBadge(t.type)}
            <span class="advisor-pill">${t.advisor}</span>
          </div>
          ${t.parts > 0 ? `<div style="margin-top:6px;font-size:10px;color:var(--color-text-tertiary)">Parts: ₹${t.parts.toLocaleString()}</div>` : ''}
        </div>`).join('') : `<div style="padding:16px;text-align:center;font-size:12px;color:var(--color-text-tertiary)">No tickets</div>`}
      </div>
    </div>`;
  }).join('')}</div>`;
}

function renderList(data) {
  return `<div class="list-view"><table class="list-table">
    <thead><tr>
      <th>ID</th><th>Date</th><th>Customer</th><th>Reg No</th><th>Model</th><th>Type</th><th>Status</th><th>Advisor</th><th>Parts (₹)</th><th>Insurance</th>
    </tr></thead>
    <tbody>${data.map(t => `<tr onclick="openDetail('${t.id}')" style="cursor:pointer">
      <td style="font-family:var(--font-mono);font-size:11px;color:var(--color-text-secondary)">${t.id}</td>
      <td style="font-size:11px;white-space:nowrap">${t.inDate||'-'}</td>
      <td style="font-weight:500">${t.customer}</td>
      <td style="font-family:var(--font-mono);font-size:11px">${t.reg}</td>
      <td>${t.model}</td>
      <td>${typeBadge(t.type)}</td>
      <td>${statusBadge(t.status)}</td>
      <td>${t.advisor}</td>
      <td style="text-align:right">${t.parts > 0 ? t.parts.toLocaleString() : '-'}</td>
      <td style="font-size:11px;color:var(--color-text-secondary)">${t.ins||'-'}</td>
    </tr>`).join('')}</tbody>
  </table></div>`;
}

function renderContent() {
  const data = getFiltered();
  renderStats(data);
  const el = document.getElementById('main-content');
  document.getElementById('page-title').textContent = advisorFilter
    ? `Advisor: ${advisorFilter} (${data.length})`
    : `Active Tickets — ${currentView === 'board' ? 'Board' : 'List'} (${data.length})`;
  el.innerHTML = currentView === 'board' ? renderBoard(data) : renderList(data);
}

function openDetail(id) {
  const t = tickets.find(x => x.id === id);
  if (!t) return;
  const s = STATUS_CONFIG[t.status] || { label: t.status, bg:'#F1EFE8', color:'#5F5E5A' };
  document.getElementById('dp-id').textContent = `${t.id} · ${t.jc || 'No job card'}`;
  document.getElementById('dp-title').textContent = `${t.customer} — ${t.model}`;
  document.getElementById('dp-body').innerHTML = `
    <div style="margin-bottom:14px">${statusBadge(t.status)} ${typeBadge(t.type)}</div>
    <div class="detail-field"><div class="detail-label">Registration</div><div class="detail-value" style="font-family:var(--font-mono)">${t.reg||'N/A'}</div></div>
    <div class="detail-field"><div class="detail-label">In Date</div><div class="detail-value">${t.inDate||'Unknown'}</div></div>
    <div class="detail-field"><div class="detail-label">Mobile</div><div class="detail-value">${t.mobile||'—'}</div></div>
    <div class="detail-field"><div class="detail-label">Advisor</div><div class="detail-value">${t.advisor}</div></div>
    <div class="detail-field"><div class="detail-label">Insurance</div><div class="detail-value">${t.ins||'—'}</div></div>
    <hr class="detail-divider">
    <div class="detail-field"><div class="detail-label">Remarks</div><div class="detail-value">${t.remarks||'—'}</div></div>
    <hr class="detail-divider">
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px">
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:2px">Parts Est.</div>
        <div style="font-size:18px;font-weight:500">₹${(t.parts||0).toLocaleString()}</div>
      </div>
      <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px">
        <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:2px">Labour Est.</div>
        <div style="font-size:18px;font-weight:500">₹${(t.labour||0).toLocaleString()}</div>
      </div>
    </div>
    <div style="margin-top:12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px">
      <div style="font-size:11px;color:var(--color-text-tertiary);margin-bottom:2px">Total Est.</div>
      <div style="font-size:20px;font-weight:500">₹${((t.parts||0)+(t.labour||0)).toLocaleString()}</div>
    </div>
    <hr class="detail-divider">
    <div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:8px">Change Status</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px">
      ${Object.entries(STATUS_CONFIG).map(([k,v]) => `<button class="btn" style="font-size:11px;padding:4px 8px;${t.status===k?'border-color:#378ADD;color:#185FA5':''}" onclick="changeStatus('${id}','${k}')">${v.label}</button>`).join('')}
    </div>
  `;
  document.getElementById('detail-panel').classList.add('open');
}

function changeStatus(id, status) {
  const t = tickets.find(x => x.id === id);
  if (t) { t.status = status; renderContent(); openDetail(id); }
}

function closeDetail() {
  document.getElementById('detail-panel').classList.remove('open');
}

function openNewTicket() {
  document.getElementById('f-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('new-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('new-modal').classList.remove('open');
}

function submitTicket() {
  const id = 'VEH-' + String(++nextId).padStart(3,'0');
  const today = new Date();
  const dateStr = `${String(today.getDate()).padStart(2,'0')}.${String(today.getMonth()+1).padStart(2,'0')}.${today.getFullYear()}`;
  tickets.push({
    id, inDate: document.getElementById('f-date').value || dateStr,
    jc: '', customer: document.getElementById('f-customer').value || 'Unknown',
    mobile: document.getElementById('f-mobile').value,
    reg: document.getElementById('f-reg').value,
    model: (document.getElementById('f-model').value||'').toUpperCase(),
    type: document.getElementById('f-type').value,
    status: 'NA', advisor: document.getElementById('f-advisor').value,
    remarks: document.getElementById('f-remarks').value,
    parts: parseInt(document.getElementById('f-parts').value)||0,
    labour: parseInt(document.getElementById('f-labour').value)||0,
    ins: document.getElementById('f-ins').value, location: 'IN'
  });
  closeModal();
  renderContent();
}

document.getElementById('new-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('new-modal')) closeModal();
});

renderContent();
</script>
